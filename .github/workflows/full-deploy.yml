# 静态内容部署到 GitHub Pages 的完整工作流
name: Deploy VitePress & Notify

# 触发条件：推送至 master/main 分支或手动触发
on:
  push:
    branches: ['master', 'main']
  pull_request:
    branches: ['master', 'main']
  workflow_dispatch:

# 全局环境变量
env:
  TZ: Asia/Shanghai

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # 构建作业
  build:
    name: Build Documentation
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [24]
      fail-fast: false

    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 设置 Node.js
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          architecture: 'x64'
          check-latest: true
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4. 验证依赖安装
      - name: Verify installation
        run: |
          npm list --depth=0
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"

      # 放在 build 作业的 steps 中
      - name: Clean previous build artifacts
        run: rm -rf .vitepress/.temp .vitepress/dist node_modules/.vite

      # 5. 构建文档
      - name: Build docs
        run: npm run docs:build
        env:
          NODE_OPTIONS: '--max-old-space-size=10240'
          NODE_ENV: production

      # 6. 生成部署信息文件（可选，无需可删除整个步骤）
      - name: Add deployment info
        run: |
          mkdir -p .vitepress/dist
          echo "Deployment time: $(date)" >> .vitepress/dist/deployment-info.txt
          echo "Commit: ${{ github.sha }}" >> .vitepress/dist/deployment-info.txt
          echo "Branch: ${{ github.ref_name }}" >> .vitepress/dist/deployment-info.txt
          echo "Workflow: ${{ github.workflow }}" >> .vitepress/dist/deployment-info.txt

      # 7. 验证构建输出
      - name: Verify build output
        run: |
          if [ -d ".vitepress/dist" ]; then
            echo "✅ 构建成功！输出目录: .vitepress/dist"
            echo "总文件数: $(find .vitepress/dist -type f | wc -l)"
          else
            echo "❌ 构建失败: .vitepress/dist 目录不存在"
            exit 1
          fi

      # 8. 上传构建产物 (v5)
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          artifact-name: documentation
          path: .vitepress/dist
          retention-days: 5

  # 部署作业
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write
      contents: write

    steps:
      - name: Check workspace
        run: |
          echo "=== Workspace structure ==="
          ls -la

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          artifact-name: documentation
          path: ./_site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate deployment files
        run: |
          echo "=== 验证下载的构建产物 ==="
          echo "当前目录：$(pwd)"
          echo "_site 目录内容:"
          ls -la ./_site/
          echo "下载的文件："
          find ./_site -type f -name "*.html" | head -5

          if [ ! -f "./_site/index.html" ]; then
            echo "❌ 错误：没有找到 index.html"
            echo "目录结构："
            ls -la ./_site/
            exit 1
          fi

          echo "✅ 找到 index.html，准备部署"

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Prepare deployment output
        if: success()
        run: |
          echo "DEPLOY_STATUS=success" >> $GITHUB_ENV
          echo "PAGE_URL=${{ steps.deployment.outputs.page_url }}" >> $GITHUB_ENV

      - name: Prepare failure output
        if: failure()
        run: |
          echo "DEPLOY_STATUS=failure" >> $GITHUB_ENV
          echo "PAGE_URL=" >> $GITHUB_ENV

  # 通知作业
  notify:
    name: 📢 Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Prepare notification data
        id: prepare-notification
        run: |
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          COMMIT_SHA_SHORT="${{ github.sha }}" && COMMIT_SHA_SHORT=${COMMIT_SHA_SHORT:0:7}
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SINGLE_LINE_MSG=$(echo "$COMMIT_MSG" | head -n1 | sed 's/"/\\"/g')

          case $DEPLOY_RESULT in
            success)
              EMOJI="✅"
              STATUS_COLOR="#36a64f"
              STATUS_TEXT="成功"
              ;;
            failure)
              EMOJI="❌"
              STATUS_COLOR="#ff0000"
              STATUS_TEXT="失败"
              ;;
            cancelled)
              EMOJI="⚠️"
              STATUS_COLOR="#ffaa00"
              STATUS_TEXT="已取消"
              ;;
            *)
              EMOJI="❓"
              STATUS_COLOR="#808080"
              STATUS_TEXT="未知"
              ;;
          esac

          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "status_color=$STATUS_COLOR" >> $GITHUB_OUTPUT
          echo "status_text=$STATUS_TEXT" >> $GITHUB_OUTPUT
          echo "commit_sha_short=$COMMIT_SHA_SHORT" >> $GITHUB_OUTPUT
          echo "commit_msg=$SINGLE_LINE_MSG" >> $GITHUB_OUTPUT
          echo "deploy_result=$DEPLOY_RESULT" >> $GITHUB_OUTPUT

      - name: Create GitHub Summary
        run: |
          echo "## ${{ steps.prepare-notification.outputs.emoji }} 部署通知" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态**: **${{ steps.prepare-notification.outputs.status_text }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 详细信息" >> $GITHUB_STEP_SUMMARY
          echo "- **仓库**: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: \`${{ steps.prepare-notification.outputs.commit_sha_short }}\` - ${{ steps.prepare-notification.outputs.commit_msg }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.triggering_actor || github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **工作流**: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.prepare-notification.outputs.deploy_result }}" == "success" ]]; then
            echo "### 🌐 访问地址" >> $GITHUB_STEP_SUMMARY
            echo "网站已发布至：[**${{ needs.deploy.outputs.PAGE_URL }}**](${{ needs.deploy.outputs.PAGE_URL }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🚀 部署完成！" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❗ 后续操作" >> $GITHUB_STEP_SUMMARY
            echo "请检查 **deploy** 作业的日志以排查错误。" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 未设置，跳过通知"
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' --data '{
            "attachments": [
              {
                "color": "${{ steps.prepare-notification.outputs.status_color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.prepare-notification.outputs.emoji }} VitePress 部署 ${{ steps.prepare-notification.outputs.status_text }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*仓库*\n`${{ github.repository }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*分支*\n`${{ github.ref_name }}`"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*提交*\n`${{ steps.prepare-notification.outputs.commit_sha_short }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*状态*\n${{ steps.prepare-notification.outputs.status_text }}"
                      }
                    ]
                  }
                  ${{ needs.deploy.result == 'success' && format(', {0} {1}', '{ "type": "section", "text": { "type": "mrkdwn", "text": "*🌐 访问地址*\\n<{0}|{0}>" } }', needs.deploy.outputs.PAGE_URL) || '' }}
                ]
              }
            ]
          }' $SLACK_WEBHOOK_URL

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL 未设置，跳过通知"
            exit 0
          fi
          COLOR_NUM=$(echo "${{ steps.prepare-notification.outputs.status_color }}" | sed 's/#//g')
          COLOR_DEC=$((16#$COLOR_NUM))

          curl -H "Content-Type: application/json" -X POST -d '{
            "embeds": [{
              "title": "🚀 VitePress 部署 ${{ steps.prepare-notification.outputs.status_text }}",
              "description": "**仓库**: ${{ github.repository }}\\n**分支**: `${{ github.ref_name }}`",
              "color": '$COLOR_DEC',
              "fields": [
                {
                  "name": "提交",
                  "value": "`${{ steps.prepare-notification.outputs.commit_sha_short }}` - ${{ steps.prepare-notification.outputs.commit_msg }}",
                  "inline": false
                },
                {
                  "name": "状态",
                  "value": "${{ steps.prepare-notification.outputs.emoji }} ${{ steps.prepare-notification.outputs.status_text }}",
                  "inline": true
                },
                {
                  "name": "触发者",
                  "value": "${{ github.triggering_actor || github.actor }}",
                  "inline": true
                }
                ${{ needs.deploy.result == 'success' && format(', {0} {1}', '{ "name": "访问地址", "value": "[点击访问]({0})", "inline": false }', needs.deploy.outputs.PAGE_URL) || '' }}
              ],
              "footer": {
                "text": "GitHub Actions • ${{ github.workflow }}"
              },
              "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'"
            }]
          }' $DISCORD_WEBHOOK_URL

      - name: Send Email on Failure
        if: failure()
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$EMAIL_TO" ]; then
            echo "EMAIL_TO 未设置，跳过邮件通知"
            exit 0
          fi
          echo -e "主题：${{ steps.prepare-notification.outputs.emoji }} VitePress 部署失败 - ${{ github.repository }}\n\n部署工作流失败。\n\n仓库：${{ github.repository }}\n分支：${{ github.ref_name }}\n提交：${{ steps.prepare-notification.outputs.commit_sha_short }}\n触发者：${{ github.actor }}\n工作流链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | mail -s "${{ steps.prepare-notification.outputs.emoji }} VitePress 部署失败 - ${{ github.repository }}" $EMAIL_TO

      - name: Final notification status
        run: |
          echo "========================================"
          echo "通知作业完成"
          echo "部署结果: ${{ steps.prepare-notification.outputs.deploy_result }}"
          echo "摘要已生成至 GitHub Actions 界面"
          echo "========================================"
