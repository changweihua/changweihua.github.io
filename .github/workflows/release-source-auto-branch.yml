name: Create Source Branch on Release Commit

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: ''

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

concurrency:
  group: source-branch-${{ github.ref_name }}-${{ github.event.inputs.version || github.sha }}
  cancel-in-progress: false

jobs:
  create-source-branch:
    name: Create source branch from commit message
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, ':bookmark: release:'))
    outputs:
      version: ${{ steps.version.outputs.tag }}
      branch_created: ${{ steps.push.outputs.branch_created || 'false' }}
    steps:
      # ----------------------------------------
      # [1/6] 提取版本号
      # ----------------------------------------
      - name: "[1/6] 提取版本号"
        id: version
        run: |
          echo "::group::🔍 正在解析版本号..."
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
            echo "手动触发，使用输入的版本号：$TAG"
          else
            TAG=$(echo "${{ github.event.head_commit.message }}" | grep -oP '(?<=:bookmark: release: )v[0-9]+\.[0-9]+\.[0-9]+')
            if [ -z "$TAG" ]; then
              echo "❌ 提交信息中未找到有效的版本号，格式需为 :bookmark: release: vX.Y.Z"
              exit 1
            fi
            echo "从提交信息中提取到版本号：$TAG"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错误，必须为 vX.Y.Z 形式"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$TAG" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ----------------------------------------
      # [2/6] 检出代码
      # ----------------------------------------
      - name: "[2/6] 检出代码"
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      # ----------------------------------------
      # [3/6] 准备源码快照
      # ----------------------------------------
      - name: "[3/6] 准备源码快照"
        run: |
          echo "::group::📦 正在复制源码并生成版本信息..."
          mkdir -p /tmp/release-src
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.vitepress/dist' \
            --exclude='.vitepress/cache' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            --exclude='*.tsbuildinfo' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='coverage' \
            --exclude='.nyc_output' \
            --exclude='.env*' \
            --exclude='!.env.example' \
            ./ /tmp/release-src/

          {
            echo "repository: ${{ github.repository }}"
            echo "version: ${{ steps.version.outputs.tag }}"
            echo "commit: ${{ github.sha }}"
            echo "branch: ${{ github.ref_name }}"
            echo "workflow: ${{ github.workflow }}"
            echo "run_id: ${{ github.run_id }}"
            echo "built_at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "triggered_by: ${{ github.actor }}"
          } > /tmp/release-src/RELEASE.txt

          if [ -f /tmp/release-src/RELEASE.txt ]; then
            echo "✅ RELEASE.txt 已生成"
            cat /tmp/release-src/RELEASE.txt
          else
            echo "❌ RELEASE.txt 生成失败"
            exit 1
          fi
          echo "::endgroup::"

      # ----------------------------------------
      # [4/6] 检查远程分支
      # ----------------------------------------
      - name: "[4/6] 检查远程分支状态"
        id: check-branch
        run: |
          echo "::group::🌿 检查目标分支是否存在..."
          BRANCH="${{ steps.version.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "⚠️ 分支 '$BRANCH' 已存在，将会被覆盖。"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 分支 '$BRANCH' 不存在，即将创建。"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      # ----------------------------------------
      # [5/6] 推送到版本分支
      # ----------------------------------------
      - name: "[5/6] 推送源码到版本分支"
        id: push
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/release-src
          publish_branch: ${{ steps.version.outputs.branch }}
          force_orphan: true
          commit_message: "Source snapshot for ${{ steps.version.outputs.tag }} [skip ci]"

      # ----------------------------------------
      # [6/6] 生成摘要与通知
      # ----------------------------------------
      - name: "[6/6] 生成摘要并发送通知"
        if: always()
        run: |
          echo "::group::📋 生成工作流摘要..."
          STATUS="✅ 成功"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="❌ 失败"
          fi
          {
            echo "## $STATUS 源码分支处理完成"
            echo "- **分支名称**: \`${{ steps.version.outputs.branch }}\`"
            echo "- **版本号**: ${{ steps.version.outputs.tag }}"
            echo "- **触发方式**: ${{ github.event_name == 'workflow_dispatch' && '手动' || '提交信息匹配' }}"
            echo "- **分支链接**: [查看分支](${{ github.server_url }}/${{ github.repository }}/tree/${{ steps.version.outputs.branch }})"
            echo "- **分支状态**: ${{ steps.check-branch.outputs.exists == 'true' && '已覆盖' || '全新创建' }}"
            echo "- **工作流链接**: [查看运行](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
          echo "::endgroup::"

      # ----- 可选：Slack 通知 -----
      - name: 发送 Slack 通知
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "::group::📢 正在发送 Slack 通知..."
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="#36a64f"
            EMOJI="✅"
          else
            COLOR="#ff0000"
            EMOJI="❌"
          fi
          curl -X POST -H 'Content-type: application/json' --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"$EMOJI 源码分支 ${{ steps.version.outputs.branch }} 创建$([ $STATUS = success ] && echo 成功 || echo 失败)\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*仓库*\n${{ github.repository }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*版本*\n${{ steps.version.outputs.tag }}\"}
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"<${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${{ steps.version.outputs.branch }}|查看分支>\"
                  }
                }
              ]
            }]
          }" $SLACK_WEBHOOK_URL
          echo "::endgroup::"

      # ----- 可选：Discord 通知 -----
      - name: 发送 Discord 通知
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "::group::📢 正在发送 Discord 通知..."
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="65280"
            TITLE="✅ 源码分支创建成功"
          else
            COLOR="16711680"
            TITLE="❌ 源码分支创建失败"
          fi
          curl -H "Content-Type: application/json" -X POST -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"**仓库**: ${{ github.repository }}\\n**版本**: ${{ steps.version.outputs.tag }}\\n**分支**: \`${{ steps.version.outputs.branch }}\`\",
              \"color\": $COLOR,
              \"url\": \"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${{ steps.version.outputs.branch }}\",
              \"footer\": {
                \"text\": \"${{ github.workflow }} • ${{ github.run_id }}\"
              },
              \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
            }]
          }" $DISCORD_WEBHOOK_URL
          echo "::endgroup::"
