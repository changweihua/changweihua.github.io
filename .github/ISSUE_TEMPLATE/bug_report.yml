name: Bug Report
description: Report a bug in BrowserWing
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BrowserWing Version
      placeholder: e.g. v1.0.1-beta.2
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Docker
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      placeholder: Paste relevant logs here
